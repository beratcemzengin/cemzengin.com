<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1020;--panel:rgba(255,255,255,.06);--stroke:rgba(255,255,255,.10);
      --text:#e9eefc;--muted:rgba(233,238,252,.68);--muted2:rgba(233,238,252,.50);
      --accent:#7c5cff;--accent2:#19d3ff;--radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 15%,rgba(124,92,255,.25),transparent 60%),
        radial-gradient(700px 450px at 85% 30%,rgba(25,211,255,.20),transparent 55%),
        var(--bg);
      color:var(--text);line-height:1.6;min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    /* NAV */
    .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(11,16,32,.70);border-bottom:1px solid var(--stroke)}
    .nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:700}
    .dot{width:10px;height:10px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .nav-links{display:flex;gap:8px;flex-wrap:wrap}
    .nav-links a{padding:8px 14px;border:1px solid var(--stroke);border-radius:999px;font-size:13px;color:var(--muted);transition:.2s}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.06)}

    /* HERO */
    .hero{max-width:1100px;margin:0 auto;padding:60px 20px 30px}
    .hero-inner{
      border:1px solid var(--stroke);border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      padding:40px 30px;
    }
    .kicker{font-size:13px;color:var(--muted);border:1px solid var(--stroke);padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.03)}
    h1{margin:18px 0 12px;font-size:clamp(28px,5vw,44px);line-height:1.1;letter-spacing:-.8px}
    .sub{color:var(--muted);font-size:15px;max-width:58ch;margin-bottom:22px}
    .cta{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;height:44px;padding:0 20px;border-radius:12px;border:1px solid var(--stroke);background:rgba(255,255,255,.04);font-weight:600;transition:.2s}
    .btn:hover{background:rgba(255,255,255,.08);transform:translateY(-1px)}
    .btn.primary{border-color:rgba(124,92,255,.55);background:linear-gradient(135deg,rgba(124,92,255,.90),rgba(25,211,255,.80));color:#081022}

    /* SECTION */
    .section{max-width:1100px;margin:0 auto;padding:30px 20px}
    .section-title{font-size:20px;margin-bottom:18px;letter-spacing:-.3px}

    /* FILTERS */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .chip{padding:8px 16px;border:1px solid var(--stroke);background:rgba(255,255,255,.03);border-radius:999px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;transition:.2s}
    .chip:hover{color:var(--text);background:rgba(255,255,255,.06)}
    .chip.active{color:var(--text);border-color:rgba(124,92,255,.45);background:rgba(124,92,255,.16)}

    /* GRID */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .card{border:1px solid var(--stroke);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03))}
    .post{padding:20px;transition:.2s;display:block}
    .post:hover{transform:translateY(-3px);background:rgba(255,255,255,.07)}
    .tag{display:inline-block;font-size:12px;color:var(--muted);padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);margin-bottom:8px}
    .post h3{font-size:15px;margin-bottom:8px;letter-spacing:-.2px}
    .post p{color:var(--muted);font-size:13px;margin-bottom:12px}
    .meta{display:flex;justify-content:space-between;color:var(--muted2);font-size:12px}

    /* POST PAGE */
    .post-page{max-width:740px;margin:0 auto;padding:40px 20px 60px}
    .post-page .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-bottom:24px;transition:.2s}
    .post-page .back:hover{color:var(--text)}
    .post-page h1{font-size:clamp(24px,4vw,36px);margin-bottom:10px}
    .post-page .pmeta{color:var(--muted);font-size:13px;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--stroke)}
    .post-page .content{color:var(--muted);font-size:15px;line-height:1.85}
    .post-page .content h2{color:var(--text);font-size:22px;margin:36px 0 12px;letter-spacing:-.3px}
    .post-page .content h3{color:var(--accent2);font-size:17px;margin:28px 0 10px}
    .post-page .content p{margin-bottom:18px}
    .post-page .content ul,.post-page .content ol{margin:0 0 18px 24px}
    .post-page .content li{margin-bottom:8px}
    .post-page .content code{background:rgba(124,92,255,.15);color:var(--text);padding:2px 7px;border-radius:5px;font-size:14px}
    .post-page .content pre{background:rgba(0,0,0,.35);border:1px solid var(--stroke);border-radius:12px;padding:20px;overflow-x:auto;margin:20px 0}
    .post-page .content pre code{background:none;padding:0;color:#7ee787;font-size:13px}
    .post-page .content blockquote{border-left:3px solid var(--accent);padding:12px 20px;margin:20px 0;background:rgba(124,92,255,.06);border-radius:0 12px 12px 0}

    /* ABOUT PAGE */
    .about-page{max-width:740px;margin:0 auto;padding:40px 20px 60px}
    .about-page h1{font-size:30px;margin-bottom:20px}
    .about-page p{color:var(--muted);font-size:15px;line-height:1.85;margin-bottom:16px}

    /* FOOTER */
    footer{border-top:1px solid var(--stroke);background:rgba(11,16,32,.40);backdrop-filter:blur(10px);margin-top:30px}
    .foot{max-width:1100px;margin:0 auto;padding:24px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .foot-links{display:flex;gap:10px}
    .foot-links a{color:var(--muted);border:1px solid var(--stroke);padding:8px 14px;border-radius:10px;font-size:13px;transition:.2s}
    .foot-links a:hover{color:var(--text);background:rgba(255,255,255,.06)}
    .copy{color:var(--muted2);font-size:12px}

    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.grid{grid-template-columns:1fr}.nav-links{display:none}}
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="/"><span class="dot"></span> Cem Zengin</a>
      <div class="nav-links">
        <a href="/">Ana Sayfa</a>
        <a href="/hakkimda/">Hakkımda</a>
      </div>
    </div>
  </nav>

  {{ content }}

  <footer>
    <div class="foot">
      <div class="foot-links">
        <a href="https://linkedin.com/in/beratcemzengin" target="_blank">LinkedIn</a>
        <a href="mailto:cemzengin@cemzengin.com.tr">Mail</a>
      </div>
      <div class="copy">© <script>document.write(new Date().getFullYear())</script> Cem Zengin</div>
    </div>
  </footer>

</body>
</html>
