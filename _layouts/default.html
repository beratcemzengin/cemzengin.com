<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{ page.title }} — Cem Zengin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--black:#050508;
--bg:#080b12;
--surface:#0c1017;
--surface2:#111820;
--surface3:#161d28;
--border:rgba(0,255,120,.06);
--border2:rgba(0,255,120,.14);
--border3:rgba(0,255,120,.25);
--green:#00ff88;
--green2:#00e07a;
--green3:#00c96d;
--green-g:linear-gradient(135deg,#00ff88,#00e5ff);
--green-dim:rgba(0,255,136,.05);
--green-dim2:rgba(0,255,136,.10);
--green-dim3:rgba(0,255,136,.18);
--cyan:#00e5ff;
--purple:#a78bfa;
--red:#ff5f56;
--yellow:#ffbd2e;
--blue:#3b82f6;
--text:#c9d1d9;
--text2:#8b949e;
--text3:#484f58;
--white:#f0fdf4;
--mono:'JetBrains Mono',monospace;
--sans:'Inter',system-ui,-apple-system,sans-serif;
--r:16px;
--r2:12px;
--r3:8px;
}

html{scroll-behavior:smooth}
body{
font-family:var(--sans);
background:var(--bg);
color:var(--text);
line-height:1.6;
min-height:100vh;
-webkit-font-smoothing:antialiased;
overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
::selection{background:rgba(0,255,136,.2);color:var(--white)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:9px}

/* ─── BG ─── */
body::before{
content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
background:
  radial-gradient(1000px 700px at 10% 5%,rgba(0,255,136,.07),transparent),
  radial-gradient(800px 600px at 90% 15%,rgba(0,229,255,.05),transparent),
  radial-gradient(600px 600px at 50% 100%,rgba(0,255,136,.04),transparent);
}
.grid-bg{
position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:
  linear-gradient(rgba(0,255,120,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,120,.025) 1px,transparent 1px);
background-size:80px 80px;
mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,black 30%,transparent 100%);
-webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,black 30%,transparent 100%);
}
.scan{
position:fixed;left:0;right:0;height:1px;z-index:0;pointer-events:none;
background:rgba(0,255,136,.04);
animation:scanMove 6s linear infinite;
}
@keyframes scanMove{0%{top:-10%}100%{top:110%}}

/* ─── WRAPPER ─── */
.wrap{position:relative;z-index:1}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ═══════════════════
   NAV
   ═══════════════════ */
.topnav{
position:sticky;top:0;z-index:999;
backdrop-filter:blur(24px) saturate(1.6);
-webkit-backdrop-filter:blur(24px) saturate(1.6);
background:rgba(8,11,18,.75);
border-bottom:1px solid var(--border);
}
.topnav-inner{
display:flex;align-items:center;justify-content:space-between;
height:56px;
}

/* brand */
.logo{display:flex;align-items:center;gap:10px}
.logo-box{
width:32px;height:32px;border-radius:8px;
background:var(--green-g);
display:flex;align-items:center;justify-content:center;
font-family:var(--mono);font-weight:800;font-size:13px;color:var(--black);
box-shadow:0 0 16px rgba(0,255,136,.3);
}
.logo-text{font-weight:700;font-size:14px;color:var(--white);letter-spacing:.3px}
.logo-text span{color:var(--green)}

/* nav links */
.topnav-right{display:flex;align-items:center;gap:6px}
.n-link{
padding:6px 14px;border-radius:var(--r3);
font-size:13px;font-weight:500;color:var(--text2);
transition:.2s;
}
.n-link:hover{color:var(--green);background:var(--green-dim)}
.n-link.active{color:var(--green);background:var(--green-dim2)}
.n-status{
display:flex;align-items:center;gap:6px;
padding:5px 12px;border-radius:99px;
font-size:11px;font-family:var(--mono);
color:var(--green);
border:1px solid rgba(0,255,136,.15);
background:rgba(0,255,136,.04);
margin-left:6px;
}
.n-status i{font-size:6px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════════
   HERO
   ═══════════════════ */
.hero{padding:64px 0 32px}
.hero-row{display:grid;grid-template-columns:1fr 400px;gap:18px;align-items:start}

.hero-left{
border:1px solid var(--border);
border-radius:var(--r);
background:linear-gradient(170deg,var(--surface2) 0%,var(--surface) 100%);
padding:44px 40px;
position:relative;overflow:hidden;
}
.hero-left::after{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent 0%,var(--green) 50%,transparent 100%);
opacity:.5;
}
.hero-tag{
display:inline-flex;align-items:center;gap:8px;
padding:5px 14px;border-radius:99px;
font-size:11px;font-family:var(--mono);font-weight:500;
color:var(--green);letter-spacing:.6px;text-transform:uppercase;
border:1px solid rgba(0,255,136,.15);
background:rgba(0,255,136,.05);
margin-bottom:24px;
}
.hero-tag i{font-size:5px}
.hero h1{
font-size:clamp(30px,4.5vw,50px);
font-weight:800;line-height:1.08;letter-spacing:-1.2px;
color:var(--white);margin-bottom:16px;
}
.hero h1 em{font-style:normal;color:var(--green)}
.hero .desc{font-size:15px;color:var(--text2);max-width:50ch;margin-bottom:28px;line-height:1.75}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}

.btn{
display:inline-flex;align-items:center;gap:8px;
height:42px;padding:0 22px;border-radius:var(--r2);
font-size:13px;font-weight:600;font-family:var(--sans);
border:1px solid var(--border2);
background:var(--surface2);color:var(--text);
cursor:pointer;transition:.25s;
}
.btn:hover{background:var(--surface3);transform:translateY(-1px);border-color:var(--border3)}
.btn-g{
border:none;
background:var(--green-g);
color:var(--black);font-weight:700;
box-shadow:0 4px 24px rgba(0,255,136,.25),0 0 0 1px rgba(0,255,136,.3);
}
.btn-g:hover{box-shadow:0 8px 36px rgba(0,255,136,.35);transform:translateY(-2px)}

/* hero right */
.hero-right{display:flex;flex-direction:column;gap:14px}

/* terminal */
.term{
border:1px solid var(--border);border-radius:var(--r);
background:var(--surface);overflow:hidden;
}
.term-bar{
display:flex;align-items:center;gap:7px;
padding:10px 14px;
background:rgba(0,0,0,.3);
border-bottom:1px solid var(--border);
}
.term-d{width:9px;height:9px;border-radius:50%}
.term-t{margin-left:10px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.term-body{padding:16px 18px;font-family:var(--mono);font-size:12.5px;line-height:2}
.t-p{color:var(--green)}
.t-c{color:var(--white)}
.t-o{color:var(--text2)}
.cursor{animation:blink 1s step-end infinite}

/* info card */
.info-card{
border:1px solid var(--border);border-radius:var(--r);
background:var(--surface);padding:18px 20px;
}
.info-card h4{
font-size:10px;color:var(--text3);text-transform:uppercase;
letter-spacing:1.2px;font-family:var(--mono);margin-bottom:12px;
}
.info-row{
display:flex;justify-content:space-between;align-items:center;
padding:9px 0;border-top:1px solid var(--border);font-size:12.5px;
}
.info-row:first-of-type{border:none}
.info-l{color:var(--text2)}
.info-r{color:var(--green);font-family:var(--mono);font-weight:600}

/* ═══════════════════
   SECTIONS
   ═══════════════════ */
.sec{padding:40px 0}
.sec-head{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:20px;flex-wrap:wrap;gap:10px;
}
.sec-title{
display:flex;align-items:center;gap:10px;
font-size:18px;font-weight:700;color:var(--white);letter-spacing:-.2px;
}
.sec-title::before{
content:'';width:3px;height:18px;border-radius:2px;
background:var(--green-g);
}
.sec-hint{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* ═══════════════════
   FILTERS
   ═══════════════════ */
.filters{
display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;
padding:12px 14px;
border:1px solid var(--border);border-radius:var(--r);
background:var(--surface);
}
.fbtn{
padding:7px 16px;border-radius:var(--r3);
font-size:12px;font-weight:500;
border:1px solid transparent;background:transparent;
color:var(--text3);cursor:pointer;font-family:var(--sans);
transition:.2s;
}
.fbtn:hover{color:var(--text);background:var(--green-dim)}
.fbtn.on{color:var(--green);background:var(--green-dim2);border-color:rgba(0,255,136,.15)}

/* ═══════════════════
   POSTS GRID
   ═══════════════════ */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.pcard{
border:1px solid var(--border);border-radius:var(--r);
background:linear-gradient(175deg,var(--surface2),var(--surface));
padding:22px;display:flex;flex-direction:column;
transition:.3s;position:relative;overflow:hidden;
}
.pcard::after{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--green),transparent);
opacity:0;transition:.3s;
}
.pcard:hover{
transform:translateY(-4px);
border-color:var(--border2);
box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 30px rgba(0,255,136,.06);
}
.pcard:hover::after{opacity:.6}

.ptag{
display:inline-flex;align-items:center;gap:5px;align-self:flex-start;
font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
color:var(--green);font-family:var(--mono);
padding:4px 10px;border-radius:6px;
background:var(--green-dim);border:1px solid rgba(0,255,136,.08);
margin-bottom:14px;
}
.pcard h3{font-size:15px;font-weight:700;color:var(--white);line-height:1.35;margin-bottom:10px;letter-spacing:-.2px}
.pcard .txt{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:auto;padding-bottom:16px}
.pmeta{
display:flex;justify-content:space-between;align-items:center;
padding-top:14px;border-top:1px solid var(--border);
font-size:11px;font-family:var(--mono);color:var(--text3);
}
.arrow{color:var(--green);font-weight:700;display:flex;align-items:center;gap:4px;transition:.2s}
.pcard:hover .arrow{gap:8px}

/* ═══════════════════
   ABOUT CARD
   ═══════════════════ */
.acard{
border:1px solid var(--border);border-radius:var(--r);
background:linear-gradient(175deg,var(--surface2),var(--surface));
padding:32px;position:relative;overflow:hidden;
}
.acard::after{
content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--green),transparent);
opacity:.4;
}
.acard>p{color:var(--text2);font-size:14px;line-height:1.8;margin-bottom:24px}
.acard strong{color:var(--white)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.acard h3{
font-size:11px;color:var(--green);font-family:var(--mono);
text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
}
.slist{list-style:none;display:flex;flex-direction:column;gap:6px}
.slist li{
display:flex;align-items:center;gap:8px;
padding:8px 12px;border-radius:var(--r3);font-size:13px;color:var(--text);
border:1px solid var(--border);background:rgba(0,0,0,.15);
transition:.2s;
}
.slist li:hover{border-color:var(--border2);background:var(--green-dim)}
.slist li::before{content:'▹';color:var(--green);font-size:12px}

/* ═══════════════════
   POST PAGE
   ═══════════════════ */
.pp{max-width:780px;margin:0 auto;padding:48px 24px 80px}
.pp .back{
display:inline-flex;align-items:center;gap:6px;
padding:7px 14px;border-radius:var(--r3);font-size:12px;font-weight:500;
color:var(--text2);border:1px solid var(--border);background:var(--surface);
margin-bottom:28px;transition:.2s;
}
.pp .back:hover{color:var(--green);border-color:var(--border2)}
.pp h1{font-size:clamp(22px,4vw,36px);font-weight:800;color:var(--white);line-height:1.15;letter-spacing:-.6px;margin:12px 0}
.pp .pm{color:var(--text3);font-size:12px;font-family:var(--mono);padding:14px 0 24px;margin-bottom:28px;border-bottom:1px solid var(--border)}
.pp .content{color:var(--text);font-size:15px;line-height:1.85}
.pp .content h2{color:var(--white);font-size:22px;margin:36px 0 14px;letter-spacing:-.3px;padding-left:14px;border-left:3px solid var(--green)}
.pp .content h3{color:var(--cyan);font-size:17px;margin:28px 0 10px}
.pp .content p{margin-bottom:18px}
.pp .content ul,.pp .content ol{margin:0 0 18px 20px}
.pp .content li{margin-bottom:8px}
.pp .content strong{color:var(--white)}
.pp .content code{background:rgba(0,255,136,.08);color:var(--green);padding:2px 7px;border-radius:5px;font-size:13px;font-family:var(--mono)}
.pp .content pre{background:var(--black);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin:20px 0;overflow-x:auto;position:relative}
.pp .content pre::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.4}
.pp .content pre code{background:none;padding:0;color:#7ee787;font-size:13px}
.pp .content blockquote{border-left:3px solid var(--green);padding:14px 20px;margin:20px 0;background:var(--green-dim);border-radius:0 var(--r3) var(--r3) 0;font-size:14px}
.pp .content table{width:100%;border-collapse:collapse;margin:20px 0;font-size:13px}
.pp .content th{text-align:left;padding:10px 14px;border-bottom:2px solid var(--border2);color:var(--green);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.pp .content td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
.pp .content tr:hover td{background:var(--green-dim)}

/* about page */
.ap{max-width:780px;margin:0 auto;padding:48px 24px 80px}
.ap h1{font-size:28px;font-weight:800;color:var(--white);margin-bottom:20px}
.ap p{color:var(--text2);font-size:15px;line-height:1.85;margin-bottom:14px}
.ap strong{color:var(--white)}
.ap ul{list-style:none;margin:0 0 20px}
.ap li{padding:6px 0;color:var(--text);font-size:14px;display:flex;align-items:center;gap:8px}
.ap li::before{content:'▹';color:var(--green)}
.ap a{color:var(--green);text-decoration:underline;text-underline-offset:3px}

/* ═══════════════════
   FOOTER
   ═══════════════════ */
.ft{border-top:1px solid var(--border);background:rgba(5,5,8,.5);backdrop-filter:blur(10px);margin-top:48px}
.ft-inner{display:flex;align-items:center;justify-content:space-between;padding:20px 0;flex-wrap:wrap;gap:10px}
.ft-links{display:flex;gap:8px}
.ft-a{
padding:7px 14px;border-radius:var(--r3);font-size:12px;font-weight:500;
color:var(--text3);border:1px solid var(--border);
background:rgba(0,0,0,.2);transition:.2s;
}
.ft-a:hover{color:var(--green);border-color:var(--border2);background:var(--green-dim)}
.ft-c{color:var(--text3);font-size:11px;font-family:var(--mono)}

/* ═══════════════════
   RESPONSIVE
   ═══════════════════ */
@media(max-width:960px){
.hero-row{grid-template-columns:1fr}
.pgrid{grid-template-columns:repeat(2,1fr)}
.agrid{grid-template-columns:1fr}
}
@media(max-width:640px){
.pgrid{grid-template-columns:1fr}
.hero-left{padding:28px 20px}
.topnav-right{display:none}
.hero h1{font-size:26px}
.filters{overflow-x:auto;flex-wrap:nowrap}
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scan"></div>

<div class="wrap">

<nav class="topnav">
<div class="container">
<div class="topnav-inner">
  <a class="logo" href="/">
    <div class="logo-box">CZ</div>
    <div class="logo-text"><span>cem</span>zengin</div>
  </a>
  <div class="topnav-right">
    <a class="n-link active" href="/">Blog</a>
    <a class="n-link" href="/hakkimda/">Hakkımda</a>
    <div class="n-status"><i class="fas fa-circle"></i> online</div>
  </div>
</div>
</div>
</nav>

{{ content }}

<footer class="ft">
<div class="container">
<div class="ft-inner">
  <div class="ft-links">
    <a class="ft-a" href="https://linkedin.com/in/beratcemzengin" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
    <a class="ft-a" href="mailto:cemzengin@cemzengin.com.tr"><i class="fas fa-envelope"></i> Mail</a>
  </div>
  <div class="ft-c">© <script>document.write(new Date().getFullYear())</script> cem zengin</div>
</div>
</div>
</footer>

</div>
</body>
</html>
