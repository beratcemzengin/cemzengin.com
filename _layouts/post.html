---
layout: default
---

<div class="post-page">
  <a href="/" class="back">← geri dön</a>
  <span class="post-tag" style="margin-bottom:12px">{{ page.categories | first }}</span>
  <h1>{{ page.title }}</h1>
  <div class="pmeta">{{ page.date | date: "%d.%m.%Y" }} · {{ page.content | number_of_words | divided_by: 200 | plus: 1 }} dk okuma</div>
  <div class="content">
    {{ content }}
  </div>
</div>
